# @package _global_

# KAN Bias MLP Sweep (9 runs)
# 3 x 3 = 9 grid points:
#   bias config:  standard lorentz, KAN lorentz, KAN lorentz+global
#   seed:         42, 123, 7
#
# Purpose: does replacing low-dimensional physics-bias MLPs with KAN
#   improve attention bias learning?  Narrowly scoped to LorentzScalarBias
#   and GlobalConditionedBias (the cleanest low-dim mappings).

meta:
  goal: "classification"

experiment:
  name: "kan_bias"

hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}_job
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      # Bias setup axis (3 modes, mapped via classifier/kan_bias_setup group)
      +classifier/kan_bias_setup: baseline_lorentz,kan_lorentz,kan_lorentz_plus_global

      # Fixed architecture (matching existing baseline experiments)
      +classifier/model_size: s200k
      classifier.model.tokenizer.name: raw
      classifier.model.positional: sinusoidal
      classifier.model.head.pooling: cls
      classifier.model.head.type: linear
      classifier.model.ffn.type: standard

      # Seeds and epochs
      classifier.trainer.epochs: 50
      classifier.trainer.seed: 42,123,7

data:
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null
