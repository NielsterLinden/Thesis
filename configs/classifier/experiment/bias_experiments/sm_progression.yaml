# @package _global_
# 4t vs background — SM interaction matrix progression
# Tests the Builtjes et al. (2025) key claim: monotonic improvement as physics
# fidelity increases from binary flags → fixed couplings → running couplings.
# Sweep: 3 SM modes x 3 seeds = 9 jobs

meta:
  goal: "classification"

experiment:
  name: "4tbg_physics_sm_progression"

hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      +classifier/model_size: s600k
      classifier.trainer.seed: 42,123,314
      classifier.model.attention_biases: sm_interaction
      classifier.model.bias_config.sm_interaction.mode: "binary,fixed_coupling,running_coupling"
      classifier.model.tokenizer.name: raw
      classifier.model.positional: sinusoidal
      classifier.model.head.pooling: cls
      classifier.model.norm.policy: post
      classifier.trainer.epochs: 50

data:
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null
