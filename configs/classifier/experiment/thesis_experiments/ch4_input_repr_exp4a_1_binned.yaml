# @package _global_
# Chapter 4 — commands for `ch4_input_repr_exp4a_1_binned`; put CLI overrides before --multirun.
#
# Local trial:
# thesis-train env=local data.limit_samples=500 classifier.trainer.epochs=1 logging.use_wandb=false classifier/experiment=thesis_experiments/ch4_input_repr_exp4a_1_binned --multirun
#
# HPC trial:
# condor_submit hpc/stoomboot/train.sub -append 'arguments = env=stoomboot data.limit_samples=500 classifier.trainer.epochs=1 logging.use_wandb=false classifier/experiment=thesis_experiments/ch4_input_repr_exp4a_1_binned --multirun'
#
# HPC full sweep:
# condor_submit hpc/stoomboot/train.sub -append 'arguments = env=stoomboot classifier/experiment=thesis_experiments/ch4_input_repr_exp4a_1_binned --multirun'
#
# Requires `4tops_5bins_ours.h5` under env data_root (see configs/env/local.yaml).
#
# Exp 4A part 1: binned tokenizer + 4tops_5bins_ours.h5. 3 runs.

defaults:
  - override /data: h5_tokens_binned

meta:
  goal: "classification"

experiment:
  name: "ch4_input_repr_exp4a_1_binned"

hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      classifier.trainer.seed: 42,123,314

classifier:
  model:
    tokenizer:
      name: binned
      pid_mode: learned
      id_embed_dim: 8
  trainer:
    epochs: 50

data:
  _struct_: false
  path: "${env.data_root}/4tops_5bins_ours.h5"
  use_binned_tokens: true
  limit_samples: 0
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null
