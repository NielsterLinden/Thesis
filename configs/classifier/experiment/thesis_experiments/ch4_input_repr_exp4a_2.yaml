# @package _global_
# Chapter 4 — commands for `ch4_input_repr_exp4a_2`; put CLI overrides before --multirun.
#
# Local trial:
# thesis-train env=local data.limit_samples=500 classifier.trainer.epochs=1 logging.use_wandb=false classifier/experiment=thesis_experiments/ch4_input_repr_exp4a_2 --multirun
#
# HPC trial:
# condor_submit hpc/stoomboot/train.sub -append 'arguments = env=stoomboot data.limit_samples=500 classifier.trainer.epochs=1 logging.use_wandb=false classifier/experiment=thesis_experiments/ch4_input_repr_exp4a_2 --multirun'
#
# HPC full sweep:
# condor_submit hpc/stoomboot/train.sub -append 'arguments = env=stoomboot classifier/experiment=thesis_experiments/ch4_input_repr_exp4a_2 --multirun'
#
# Binned only: if `data.limit_samples` is rejected, use +data.limit_samples=500 instead.
#
# Exp 4A part 2: identity, PID mode × id_embed_dim × seeds. 27 runs.

meta:
  goal: "classification"

experiment:
  name: "ch4_input_repr_exp4a_2"

hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      classifier.model.tokenizer.pid_mode: learned,one_hot,fixed_random
      classifier.model.tokenizer.id_embed_dim: 8,16,32
      classifier.trainer.seed: 42,123,314

classifier:
  model:
    tokenizer:
      name: identity
  trainer:
    epochs: 50

data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null
