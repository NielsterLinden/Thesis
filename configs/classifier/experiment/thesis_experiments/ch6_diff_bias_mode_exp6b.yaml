# @package _global_
# Chapter 6 Exp 6B — differential bias mode x seeds (Table 6.2).
# Fixed: A3=differential, B1=lorentz_scalar, chapter baseline. Lorentz features: placeholder [m2, deltaR].
# Sweep: 3 x 3 = 9 runs.
#
# Local smoke:
# thesis-train env=local loop=transformer_classifier data.limit_samples=50 classifier.trainer.epochs=1 logging.use_wandb=false classifier/experiment=thesis_experiments/ch6_diff_bias_mode_exp6b --multirun
#
# Stoomboot full:
# thesis-train env=stoomboot loop=transformer_classifier classifier/experiment=thesis_experiments/ch6_diff_bias_mode_exp6b --multirun

meta:
  goal: "classification"

experiment:
  name: "ch6_diff_bias_mode_exp6b"

hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      classifier.trainer.seed: 42,123,314
      classifier.model.attention.diff_bias_mode: none,shared,split

classifier:
  globals:
    include_met: true
  model:
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    attention:
      type: differential
    attention_biases: lorentz_scalar
    bias_config:
      lorentz_scalar:
        features: [m2, deltaR]
  trainer:
    epochs: 50

data:
  _struct_: false
  classifier:
    selected_labels: [1, 2, 3, 4, 5]
