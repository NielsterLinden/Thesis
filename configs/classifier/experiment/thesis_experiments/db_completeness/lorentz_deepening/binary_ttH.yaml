# @package _global_
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      classifier.model.bias_config.lorentz_scalar.features: "[m2,deltaR],[m2,deltaR,log_m2]"
experiment:
  name: "lor_binary_ttH"

classifier:
  globals:
    include_met: true
  model:
    dim: 256
    depth: 6
    heads: 8
    mlp_dim: 1024
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    attention_biases: lorentz_scalar
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    selected_labels: [1, 2]

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=lorentz_deepening"]
