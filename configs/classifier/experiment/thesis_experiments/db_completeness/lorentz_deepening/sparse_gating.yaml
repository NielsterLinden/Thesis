hydra:
  mode: MULTIRUN
  sweeper:
    params:
      classifier.model.bias_config.lorentz_scalar.features: "[m2,deltaR],[m2,deltaR,log_m2],[log_kt,z,deltaR],[m2,deltaR,log_m2,log_kt,z,deltaR_ptw]"
experiment:
  name: "lor_sparse_gating"

classifier:
  globals:
    include_met: true
  model:
    dim: 256
    depth: 6
    heads: 8
    mlp_dim: 1024
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    attention_biases: lorentz_scalar
    bias_config:
      lorentz_scalar:
        sparse_gating: true
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=lorentz_deepening"]
