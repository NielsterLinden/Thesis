# @package _global_
hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      classifier.model.bias_config.lorentz_scalar.features: '[m2,deltaR],[m2,deltaR,log_m2],[log_kt,z,deltaR]'
experiment:
  name: lor_multiclass
classifier:
  globals:
    include_met: true
  model:
    dim: 384
    depth: 3
    heads: 4
    mlp_dim: 1536
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    attention_biases: lorentz_scalar
  trainer:
    epochs: 50
    seed: 42
    batch_size: 1024
data:
  _struct_: false
  classifier:
    selected_labels:
    - 1
    - 2
    - 3
    - 4
    - 5
logging:
  wandb:
    tags:
    - cohort=db_completeness_2026_05
    - sweep=lorentz_deepening
