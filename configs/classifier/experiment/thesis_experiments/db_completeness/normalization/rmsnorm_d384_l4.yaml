# @package _global_
hydra:
  mode: MULTIRUN

experiment:
  name: "norm_rmsnorm_d384_l4"

classifier:
  globals:
    include_met: false
  model:
    dim: 384
    depth: 4
    heads: 8
    mlp_dim: 1536
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    norm:
      type: rmsnorm
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=normalization"]
