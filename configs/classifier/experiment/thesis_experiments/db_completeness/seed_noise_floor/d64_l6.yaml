# @package _global_
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      classifier.trainer.seed: 1,2,3,4,5,6,7,8

experiment:
  name: "snf_d64_l6"

classifier:
  globals:
    include_met: false
  model:
    dim: 64
    depth: 6
    heads: 4
    mlp_dim: 256
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=seed_noise_floor"]
