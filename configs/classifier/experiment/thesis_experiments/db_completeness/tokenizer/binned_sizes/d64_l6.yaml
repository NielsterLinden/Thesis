# @package _global_
hydra:
  mode: MULTIRUN

experiment:
  name: "tok_binned"

classifier:
  globals:
    include_met: true
  model:
    dim: 64
    depth: 6
    heads: 4
    mlp_dim: 256
    dropout: 0.1
    tokenizer:
      name: binned
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  path: "${env.data_root}/4tops_5bins_ours.h5"
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=tokenizer"]
