# @package _global_
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      classifier.model.attention_biases: none,lorentz_scalar,typepair_kinematic

experiment:
  name: "tr_early_stop"

classifier:
  globals:
    include_met: false
  model:
    dim: 256
    depth: 6
    heads: 8
    mlp_dim: 1024
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
  trainer:
    epochs: 50
    seed: 42
    early_stopping:
      enabled: true
      patience: 5
      restore_best_weights: true

data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=training_recipe"]
