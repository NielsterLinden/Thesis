# @package _global_
hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
experiment:
  name: gc_cross_task_mc
classifier:
  globals:
    include_met: true
  model:
    dim: 64
    depth: 3
    heads: 4
    mlp_dim: 256
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    attention_biases: global_conditioned
    bias_config:
      global_conditioned:
        mode: met_direction
  trainer:
    epochs: 50
    seed: 42
    batch_size: 1024
data:
  _struct_: false
  classifier:
    selected_labels:
    - 1
    - 2
    - 3
    - 4
    - 5
logging:
  wandb:
    tags:
    - cohort=db_completeness_2026_05
    - sweep=global_cond_deepening
