hydra:
  mode: MULTIRUN
  sweeper:
    params:
      classifier.trainer.seed: 42,123

experiment:
  name: "tp_freeze_table"

classifier:
  globals:
    include_met: true
  model:
    dim: 256
    depth: 6
    heads: 8
    mlp_dim: 1024
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    attention_biases: typepair_kinematic
    bias_config:
      typepair_kinematic:
        freeze_table: true
        init_from_physics: fixed_coupling
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=typepair_deepening"]
