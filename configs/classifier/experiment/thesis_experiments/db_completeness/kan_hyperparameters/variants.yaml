# @package _global_
hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      classifier.model.ffn.kan.variant: hybrid,pure
      classifier.model.kan.spline_regularization_weight: 0.0,1e-2
experiment:
  name: kan_variants
classifier:
  globals:
    include_met: false
  model:
    dim: 36
    depth: 2
    heads: 4
    mlp_dim: 144
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    ffn:
      type: kan
    kan:
      grid_size: 2
      spline_order: 2
  trainer:
    epochs: 50
    seed: 42
    batch_size: 1024
data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background:
      - 2
      - 3
      - 4
      - 5
    selected_labels: null
logging:
  wandb:
    tags:
    - cohort=db_completeness_2026_05
    - sweep=kan_hyperparameters
