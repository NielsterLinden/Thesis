# @package _global_
hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      classifier.model.moe.top_k: 1,2,4
experiment:
  name: moe_m2_topk_m1_8
classifier:
  globals:
    include_met: false
  model:
    dim: 56
    depth: 2
    heads: 4
    mlp_dim: 224
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    moe:
      enabled: true
      num_experts: 8
  trainer:
    epochs: 50
    seed: 42
    batch_size: 1024
data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background:
      - 2
      - 3
      - 4
      - 5
    selected_labels: null
logging:
  wandb:
    tags:
    - cohort=db_completeness_2026_05
    - sweep=moe_hyperparameters
