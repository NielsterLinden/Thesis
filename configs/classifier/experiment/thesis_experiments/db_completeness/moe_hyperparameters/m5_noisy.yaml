hydra:
  mode: MULTIRUN
  sweeper:
    params:
      classifier.model.moe.num_experts: 2,4,8

experiment:
  name: "moe_m5_noisy"

classifier:
  globals:
    include_met: false
  model:
    dim: 256
    depth: 6
    heads: 8
    mlp_dim: 1024
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    moe:
      enabled: true
      noisy_gating: true
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=moe_hyperparameters"]
