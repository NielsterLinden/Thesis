hydra:
  mode: MULTIRUN
  sweeper:
    params:
      data.classifier.selected_labels: "[1,2],[1,2,3,4,5]"
      classifier.trainer.seed: 42,123

experiment:
  name: "config1_lorentz_perhead"

classifier:
  globals:
    include_met: true
  model:
    dim: 256
    depth: 6
    heads: 8
    mlp_dim: 1024
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    attention_biases: lorentz_scalar
    bias_config:
      lorentz_scalar:
        per_head: true
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    signal_vs_background: null
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=cross_task_replication"]
