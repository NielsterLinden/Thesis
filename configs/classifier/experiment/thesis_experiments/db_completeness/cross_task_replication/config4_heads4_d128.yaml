# @package _global_
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      data.classifier.selected_labels: "[1,2],[1,2,3,4,5]"
      classifier.trainer.seed: 42,123

experiment:
  name: "config4_heads4_d128"

classifier:
  globals:
    include_met: true
  model:
    dim: 128
    depth: 8
    heads: 4
    mlp_dim: 512
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    signal_vs_background: null
    selected_labels: null

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=cross_task_replication"]
