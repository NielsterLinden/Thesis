# @package _global_
hydra:
  mode: MULTIRUN
  sweeper:
    params:
      classifier.trainer.seed: 42,123

experiment:
  name: "sm_multiclass"

classifier:
  globals:
    include_met: true
  model:
    dim: 256
    depth: 6
    heads: 8
    mlp_dim: 1024
    dropout: 0.1
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
    attention_biases: sm_interaction
    bias_config:
      sm_interaction:
        mode: fixed_coupling
  trainer:
    epochs: 50
    seed: 42

data:
  _struct_: false
  classifier:
    selected_labels: [1, 2, 3, 4, 5]

logging:
  wandb:
    tags: ["cohort=db_completeness_2026_05", "sweep=sm_deepening"]
