# @package _global_
# Chapter 5 Exp 5A — bias family comparison (Table 5.1).
# Baseline: T1=identity, D02=true (MET), E1=sinusoidal; global_conditioned uses met_direction.
# Task: 5-way multiclass (ProcessIDs 1–5: 4t, ttH, ttW, ttWW, ttZ).
# Sweep: 6 attention_biases x 3 seeds = 18 runs.
#
# Local smoke:
# thesis-train env=local loop=transformer_classifier data.limit_samples=50 classifier.trainer.epochs=1 logging.use_wandb=false classifier/experiment=thesis_experiments/ch5_bias_families_exp5a --multirun
#
# Stoomboot full:
# thesis-train env=stoomboot loop=transformer_classifier classifier/experiment=thesis_experiments/ch5_bias_families_exp5a --multirun

meta:
  goal: "classification"

experiment:
  name: "ch5_bias_families_exp5a"

hydra:
  mode: MULTIRUN
  job:
    chdir: true
    name: ${experiment.name}
  run:
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      classifier.trainer.seed: 42,123,314
      classifier.model.attention_biases: "none,lorentz_scalar,typepair_kinematic,sm_interaction,global_conditioned,lorentz_scalar+typepair_kinematic+sm_interaction+global_conditioned"
      classifier.model.bias_config.global_conditioned.mode: met_direction

classifier:
  globals:
    include_met: true
  model:
    tokenizer:
      name: identity
      pid_mode: learned
      id_embed_dim: 8
    positional: sinusoidal
  trainer:
    epochs: 50

data:
  _struct_: false
  classifier:
    selected_labels: [1, 2, 3, 4, 5]
