# @package _global_

# Differential Attention – Core Comparison (Sweep A)
# Baseline-anchored sweep over attention.type and attention.norm with fixed
# block norm policy/type. Includes the current default as one grid point:
#   attention.type=standard, attention.norm=none, norm.policy=pre, norm.type=layernorm

meta:
  goal: "classification"

experiment:
  name: "diff_attn_core_test"

hydra:
  mode: MULTIRUN
  job:
    chdir: true
    # Suffix _test so local dry runs are clearly marked in run names
    name: ${experiment.name}_job
  run:
    # Mirror structure from bias_experiments/baseline.yaml but with experiment.name above
    dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweep:
    dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
    subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
  sweeper:
    params:
      # Core axes
      classifier.model.attention.type: standard,differential
      classifier.model.attention.norm: none,layernorm,rmsnorm
      classifier.model.norm.policy: pre
      classifier.model.norm.type: layernorm

      # Task and architecture settings (kept fixed, mirroring 4t vs bg baseline)
      +classifier/model_size: s200k
      classifier.model.attention_biases: none
      classifier.model.tokenizer.name: raw
      classifier.model.positional: sinusoidal
      classifier.model.head.pooling: cls

      # Seed/epochs policy:
      # - Local scout: override seed/epochs via CLI (e.g. seed=42, epochs=2)
      # - HPC: expand seed grid in CLI or a promoted config.
      classifier.trainer.epochs: 50
      classifier.trainer.seed: 42

data:
  classifier:
    signal_vs_background:
      signal: 1
      background: [2, 3, 4, 5]
    selected_labels: null
