env:
  data_root: C:/Users/niels/Projects/Thesis-Code/Data
  output_root: C:/Users/niels/Projects/Thesis-Code/Code/Niels_repo/outputs
  wandb_project: thesis-ml
  vq_checkpoint_path: C:/Users/niels/Projects/Thesis-Code/Code/Niels_repo/outputs/checkpoints/vq_4tops_best.pt
logging:
  save_artifacts: true
  make_plots: true
  show_plots: false
  output_root: ${env.output_root}
  figures_subdir: train_figures
  fig_format: png
  dpi: 150
  file_naming: '{family}-{moment}-{epoch_or_step}'
  destinations: file
  dry_run: false
  families:
    losses: true
    metrics: true
    recon:
      enabled: false
      mode: curves
    codebook: true
    latency:
      enabled: true
      mode: light
    adversarial: false
    diffusion: false
  moments:
    on_epoch_end_quick: false
    on_train_end_full: true
    on_validation_end: false
    on_test_end: true
  tags:
    core:
    - losses
    - metrics
    diagnostics:
    - latency
    - codebook
    heavy:
    - recon
  enable_tags: []
  use_wandb: false
  wandb:
    project: ${env.wandb_project}
    entity: ''
    run_name: ''
    group: ''
    tags: []
    mode: online
    watch_model: false
    log_freq: 100
    log_artifacts: false
    dir: ${logging.output_root}/wandb
meta:
  n_tokens: 18
  token_feat_dim: 4
  has_globals: true
  n_classes: 2
  num_types: 8
  vocab_size: null
data:
  path: ${env.data_root}/4tops_splitted.h5
  datasets:
    x_train: X_train
    x_val: X_val
    x_test: X_test
    y_train: Y_train
    y_val: y_val
    y_test: y_test
  n_tokens: 18
  globals:
    present: true
    size: 2
  norm: zscore
  seed: 42
  num_workers: 4
  cont_features:
  - 0
  - 1
  - 2
  - 3
  limit_samples: 50
  classifier:
    selected_labels:
    - 1
    - 2
general:
  trainer:
    epochs: 10
    batch_size: 128
    lr: 0.001
    weight_decay: 0.0
    num_workers: 0
    device: auto
phase1:
  encoder:
    _target_: thesis_ml.architectures.autoencoder.encoders.mlp.MLPEncoder
    enc_hidden:
    - 128
    - 128
    dropout: 0.0
    activation: gelu
    id_embed_dim: 8
  decoder:
    _target_: thesis_ml.architectures.autoencoder.decoders.mlp.MLPDecoder
    dec_hidden:
    - 128
    - 128
    dropout: 0.0
    activation: gelu
    globals_head: true
    globals_hidden:
    - 32
    globals_beta: 1.0
  latent_space:
    _target_: thesis_ml.architectures.autoencoder.bottlenecks.identity.IdentityBottleneck
    latent_dim: 32
  trainer:
    epochs: 10
    batch_size: 128
    lr: 0.001
    weight_decay: 0.0
    grad_clip: 1.0
    seed: 42
classifier:
  trainer:
    epochs: 1
    lr: 0.0001
    weight_decay: 0.01
    batch_size: 64
    warmup_steps: 1000
    lr_schedule: cosine
    label_smoothing: 0.0
    metrics:
    - acc
    - auroc
    - f1
    seed: 42
    grad_clip: 1.0
    log_pid_embeddings: false
    pid_schedule:
      mode: standard
      transition_epoch: 50
      reinit_mode: normal
      pid_lr: null
    early_stopping:
      enabled: false
      patience: 20
      min_delta: 0.0
      restore_best_weights: true
    interpretability:
      enabled: false
      save_attention_maps: false
      save_kan_splines: false
      save_moe_routing: false
      save_gradient_norms: false
      checkpoint_epochs:
      - 0
      - 10
      - 50
  globals:
    include_met: false
  model:
    dim: 256
    depth: 6
    heads: 8
    mlp_dim: 1024
    dropout: 0.1
    norm:
      policy: pre
      type: layernorm
    positional: sinusoidal
    positional_space: model
    positional_dim_mask: null
    rotary:
      base: 10000.0
    attention:
      type: standard
      norm: none
      diff_bias_mode: shared
    causal_attention: false
    head:
      type: linear
      pooling: cls
    ffn:
      type: standard
      kan:
        variant: hybrid
        bottleneck_dim: null
    shared_backbone:
      enabled: true
      features: all
    attention_biases: none
    bias_config:
      lorentz_scalar:
        features:
        - m2
        - deltaR
        hidden_dim: 8
        per_head: false
        sparse_gating: false
        mlp_type: standard
      typepair_kinematic:
        kinematic_gate: true
        kinematic_feature: log_m2
        init_from_physics: none
        mask_value: -5.0
        freeze_table: false
      sm_interaction:
        mode: binary
        mask_value: -100.0
      global_conditioned:
        global_dim: 16
        mode: global_scale
        mlp_type: standard
    nodewise_mass:
      enabled: false
      k_values:
      - 2
      - 4
      - 8
      hidden_dim: 64
    mia_blocks:
      enabled: false
      num_blocks: 5
      interaction_dim: 64
      reduction_dim: 8
      dropout: 0.0
      placement: prepend
    attn_pairwise:
      enabled: false
      features:
      - m2
      - deltaR
      hidden_dim: 8
      per_head: false
      per_layer: false
    kan:
      grid_size: 5
      spline_order: 3
      grid_range:
      - -2
      - 2
      spline_regularization_weight: 0.0
      grid_update_freq: 0
    moe:
      enabled: false
      num_experts: 4
      top_k: 1
      routing_level: token
      scope: all_blocks
      load_balance_loss_weight: 0.01
      noisy_gating: false
    tokenizer:
      name: raw
      id_embed_dim: 8
      pid_mode: learned
  experiment:
    meta:
      goal: classification
    experiment:
      name: ch4_input_repr_exp4a_1_raw
    hydra:
      mode: MULTIRUN
      job:
        chdir: true
        name: ${experiment.name}
      run:
        dir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
      sweep:
        dir: ${env.output_root}/multiruns/exp_${now:%Y%m%d-%H%M%S}_${experiment.name}
        subdir: ${env.output_root}/runs/run_${now:%Y%m%d-%H%M%S}_${experiment.name}_job${zpad:${hydra.job.num}}
      sweeper:
        params:
          classifier.trainer.seed: 42,123,314
    classifier:
      model:
        tokenizer:
          name: raw
          pid_mode: learned
          id_embed_dim: 8
      trainer:
        epochs: 50
    data:
      _struct_: false
      classifier:
        signal_vs_background:
          signal: 1
          background:
          - 2
          - 3
          - 4
          - 5
        selected_labels: null
loop: transformer_classifier
